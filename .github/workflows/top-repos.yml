name: Auto Update Top Repositories
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: write
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with top repositories
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const username = "OMI-KALIX";
            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: "updated",
              per_page: 100
            });
            const topRepos = repos
              .filter(repo => !repo.fork && repo.name.toLowerCase() !== username.toLowerCase())
              .sort((a, b) => b.stargazers_count - a.stargazers_count)
              .slice(0, 6);
            const medals = ["🥇", "🥈", "🥉", "🔹", "🔹", "🔹"];
            const cards = topRepos.map((repo, index) =>
              '<td width="50%" valign="top">\n\n' +
              `### ${medals[index]} [${repo.name}](${repo.html_url})\n` +
              `⭐ ${repo.stargazers_count}\n\n` +
              `${repo.description || "—"}\n\n` +
              '</td>'
            );
            let section =
              '## ⭐ Top Repositories\n\n' +
              '<div align="center">\n\n' +
              '<table>\n';
            for (let i = 0; i < cards.length; i += 2) {
              section +=
                '\n<tr>\n' +
                cards[i] + '\n' +
                (cards[i + 1] || '<td></td>') +
                '\n</tr>\n';
            }
            section += '\n</table>\n\n</div>\n';
            const readmePath = "README.md";
            let readme = fs.readFileSync(readmePath, "utf8");
            const start = "<!-- TOP_REPOS_START -->";
            const end = "<!-- TOP_REPOS_END -->";
            if (!readme.includes(start) || !readme.includes(end)) {
              throw new Error("TOP_REPOS markers not found in README.md");
            }
            const replacement = `${start}\n${section}\n${end}`;
            readme = readme.replace(
              new RegExp(`${start}[\\s\\S]*?${end}`),
              replacement
            );
            fs.writeFileSync(readmePath, readme);

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update top repositories"
          git push
