<svg width="100%" viewBox="0 0 1200 140" role="img" xmlns="http://www.w3.org/2000/svg">
<title>OMI-KALIX animated banner</title>
<desc>Cyberpunk-style animated GitHub profile banner for OMI-KALIX</desc>
<defs>
  <style>
    @keyframes drop {
      0%   { opacity:0; transform:translateY(-22px) scaleY(0.4); }
      55%  { opacity:1; transform:translateY(4px)  scaleY(1.06); }
      75%  { transform:translateY(-2px) scaleY(0.97); }
      100% { opacity:1; transform:translateY(0)    scaleY(1); }
    }
    @keyframes pulse {
      0%,100% { opacity:0.55; }
      50%     { opacity:1; }
    }
    @keyframes scan {
      0%   { transform:translateX(-120px); opacity:0; }
      15%  { opacity:0.6; }
      85%  { opacity:0.6; }
      100% { transform:translateX(1320px); opacity:0; }
    }
    @keyframes blink {
      0%,49%  { opacity:1; }
      50%,100%{ opacity:0; }
    }
    @keyframes dashflow {
      to { stroke-dashoffset: -24; }
    }
    .ch {
      font-family: 'Courier New', monospace;
      font-size: 52px;
      font-weight: 700;
      dominant-baseline: central;
      text-anchor: middle;
      fill: #00e5ff;
      opacity: 0;
      animation: drop 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .grid-hex { fill:none; stroke:#00e5ff; stroke-width:0.7; opacity:0; animation:pulse 3s ease-in-out infinite; }
    .accent   { stroke:#00e5ff; stroke-width:1.5; fill:none; opacity:0.45; }
    .dim      { stroke:#00e5ff; stroke-width:0.6; fill:none; opacity:0.2; }
    .flow     { stroke:#00e5ff; stroke-width:1; fill:none; opacity:0.35;
                stroke-dasharray:6 6; animation:dashflow 1.2s linear infinite; }
    .scan-bar { fill:#00e5ff; animation: scan 4s linear infinite; }
    .cursor   { fill:#00e5ff; animation: blink 1s step-end infinite; }
    .tag      { font-family:'Courier New',monospace; font-size:10px; fill:#00e5ff; opacity:0.45; }
    .sub      { font-family:'Courier New',monospace; font-size:11px; fill:#00e5ff; opacity:0.55; letter-spacing:4px; }
  </style>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#040d18"/>
    <stop offset="50%"  stop-color="#071524"/>
    <stop offset="100%" stop-color="#040d18"/>
  </linearGradient>
  <linearGradient id="hline" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
    <stop offset="30%"  stop-color="#00e5ff" stop-opacity="0.5"/>
    <stop offset="70%"  stop-color="#00e5ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clip"><rect width="1200" height="140"/></clipPath>
</defs>

<rect width="1200" height="140" fill="url(#bg)"/>

<!-- Scan line sweep -->
<g clip-path="url(#clip)">
  <rect class="scan-bar" x="0" y="62" width="80" height="2" opacity="0.5" style="animation-delay:0.8s"/>
</g>

<!-- Grid: left hex cluster -->
<g style="animation-delay:0.2s">
  <polygon class="grid-hex" points="62,28 80,18 98,28 98,48 80,58 62,48" style="animation-delay:0.2s;animation-duration:3.8s"/>
  <polygon class="grid-hex" points="98,28 116,18 134,28 134,48 116,58 98,48" style="animation-delay:0.6s;animation-duration:4.2s"/>
  <polygon class="grid-hex" points="80,58 98,48 116,58 116,78 98,88 80,78" style="animation-delay:1.0s;animation-duration:3.5s"/>
  <polygon class="grid-hex" points="62,88 80,78 98,88 98,108 80,118 62,108" style="animation-delay:0.4s;animation-duration:4.6s"/>
  <polygon class="grid-hex" points="98,88 116,78 134,88 134,108 116,118 98,108" style="animation-delay:0.9s;animation-duration:3.2s"/>
</g>

<!-- Grid: right hex cluster -->
<g style="animation-delay:0.3s">
  <polygon class="grid-hex" points="1066,28 1084,18 1102,28 1102,48 1084,58 1066,48" style="animation-delay:0.5s;animation-duration:4.1s"/>
  <polygon class="grid-hex" points="1102,28 1120,18 1138,28 1138,48 1120,58 1102,48" style="animation-delay:0.1s;animation-duration:3.6s"/>
  <polygon class="grid-hex" points="1084,58 1102,48 1120,58 1120,78 1102,88 1084,78" style="animation-delay:0.7s;animation-duration:4.4s"/>
  <polygon class="grid-hex" points="1066,88 1084,78 1102,88 1102,108 1084,118 1066,108" style="animation-delay:1.1s;animation-duration:3.9s"/>
  <polygon class="grid-hex" points="1102,88 1120,78 1138,88 1138,108 1120,118 1102,108" style="animation-delay:0.3s;animation-duration:4.7s"/>
</g>

<!-- Corner brackets -->
<g class="accent" opacity="0.6">
  <path d="M24 24 L24 8 L40 8"/>
  <path d="M1160 8 L1176 8 L1176 24"/>
  <path d="M24 116 L24 132 L40 132"/>
  <path d="M1160 132 L1176 132 L1176 116"/>
</g>

<!-- Horizontal rule lines (gradient fade) -->
<line x1="0" y1="14" x2="1200" y2="14" stroke="url(#hline)" stroke-width="0.8"/>
<line x1="0" y1="126" x2="1200" y2="126" stroke="url(#hline)" stroke-width="0.8"/>

<!-- Data flow ticks left -->
<line class="flow" x1="160" y1="70" x2="320" y2="70"/>
<!-- Data flow ticks right -->
<line class="flow" x1="880" y1="70" x2="1040" y2="70" style="animation-direction:reverse"/>

<!-- Side vertical accents -->
<line class="dim" x1="170" y1="28" x2="170" y2="112"/>
<line class="dim" x1="1030" y1="28" x2="1030" y2="112"/>

<!-- Status tags -->
<text class="tag" x="178" y="30">[ SYS:ONLINE ]</text>
<text class="tag" x="178" y="116">[ BUILD:STABLE ]</text>
<text class="tag" x="880" y="30" text-anchor="end">[ VER:2.0 ]</text>
<text class="tag" x="880" y="116" text-anchor="end">[ PWR:MAX ]</text>

<!-- Small decorative dots on flow lines -->
<circle cx="320" cy="70" r="2.5" fill="#00e5ff" opacity="0.5"/>
<circle cx="880" cy="70" r="2.5" fill="#00e5ff" opacity="0.5"/>

<!-- Subtitle label -->
<text class="sub" x="600" y="116" text-anchor="middle" style="animation:pulse 2.5s ease-in-out infinite 2s">DEVELOPER · CREATOR · BUILDER</text>

<!-- Main name letters (per-character drop with glow filter) -->
<g filter="url(#glow)">
  <text class="ch" x="296" y="64" style="animation-delay:0.10s">O</text>
  <text class="ch" x="370" y="64" style="animation-delay:0.22s">M</text>
  <text class="ch" x="444" y="64" style="animation-delay:0.34s">I</text>
  <text class="ch" x="506" y="64" style="animation-delay:0.46s" font-size="38px">—</text>
  <text class="ch" x="570" y="64" style="animation-delay:0.58s">K</text>
  <text class="ch" x="644" y="64" style="animation-delay:0.70s">A</text>
  <text class="ch" x="718" y="64" style="animation-delay:0.82s">L</text>
  <text class="ch" x="792" y="64" style="animation-delay:0.94s">I</text>
  <text class="ch" x="854" y="64" style="animation-delay:1.06s">X</text>
</g>

<!-- Blinking cursor after last letter -->
<rect class="cursor" x="880" y="42" width="3" height="36" style="animation-delay:1.3s"/>
</svg>
